<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - PuntoCerca</title>
<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
</head>
<body class="bg-gray-50 text-gray-800">

<!-- NAVBAR -->
<nav class="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm">
  <a href="/" class="flex items-center gap-2">
    <img src="/img/favicon.png" class="h-6 w-6">
    <span class="text-orange-600 font-bold text-base">PuntoCerca</span>
  </a>
  <a href="/" class="text-sm text-gray-600 hover:text-orange-600 transition">Inicio</a>
</nav>

<!-- CONTENIDO -->
<main class="px-4 py-6 max-w-5xl mx-auto">

  <!-- TÍTULO -->
  <div class="flex items-center gap-3 mb-6">
    <div class="w-1 h-7 bg-orange-500 rounded-full"></div>
    <h1 id="searchTitle" class="text-lg font-bold text-gray-800"></h1>
  </div>

  <!-- PRODUCTOS -->
  <section class="mb-8">
    <div class="flex items-center gap-2 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-orange-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
      </svg>
      <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide">Productos</h2>
    </div>
    <div id="productsResults" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
  </section>

  <!-- TIENDAS -->
  <section>
    <div class="flex items-center gap-2 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-orange-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z" />
      </svg>
      <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide">Tiendas</h2>
    </div>
    <div id="storesResults" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
  </section>

</main>

<style>
.store-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #e5e7eb;
  transition: all 0.2s ease;
}
.store-card:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}
.store-image {
  position: relative;
  height: 110px;
}
.store-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.store-status {
  position: absolute;
  top: 8px;
  left: 8px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  color: white;
  letter-spacing: 0.03em;
}
.store-status.open  { background: #16a34a; }
.store-status.closed { background: #dc2626; }
.store-content {
  padding: 10px;
}
.store-name {
  font-size: 13px;
  font-weight: 700;
  color: #111827;
  line-height: 1.3;
  margin-bottom: 4px;
}
.store-meta {
  font-size: 11px;
  color: #9ca3af;
  line-height: 1.4;
}
.store-rating {
  font-size: 11px;
  color: #f59e0b;
  margin-top: 4px;
  font-weight: 600;
}
</style>

<script src="/js/search.js"></script>
</body>
</html>
