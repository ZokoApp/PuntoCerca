<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultados - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">

</head>

<body class="bg-gray-50 text-gray-800">

<!-- =========================
HEADER COMPACTO (FIX REAL)
========================= -->
<nav class="bg-white border-b px-4 py-2 flex items-center justify-between">

  <a href="/" class="flex items-center gap-2">
    <!-- ICONO SOLO (no texto gigante) -->
    <img src="/img/favicon.png" class="h-6 w-6">
    <span class="text-orange-600 font-semibold text-sm">PuntoCerca</span>
  </a>

  <a href="/" class="text-xs text-gray-600">
    Inicio
  </a>

</nav>

<!-- =========================
CONTENIDO
========================= -->
<main class="px-4 py-4 max-w-5xl mx-auto">

  <!-- TITLE -->
  <h1 id="searchTitle" class="text-lg font-semibold mb-4"></h1>

  <!-- =========================
  PRODUCTOS
  ========================= -->
  <section class="mb-8">

    <h2 class="text-sm font-semibold mb-3 text-gray-700">
      🛒 Productos
    </h2>

    <!-- 🔥 GRID MÁS PROFESIONAL -->
    <div id="productsResults" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>

  </section>

  <!-- =========================
  TIENDAS
  ========================= -->
  <section>

    <h2 class="text-sm font-semibold mb-3 text-gray-700">
      🏪 Tiendas
    </h2>

    <div id="storesResults" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>

  </section>

</main>

<!-- =========================
CARDS AJUSTADAS (🔥 CLAVE)
========================= -->
<style>

.store-card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #eee;
  transition: 0.2s;
}

.store-card:hover {
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.store-image {
  position: relative;
  height: 110px; /* 🔥 más chica */
}

.store-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.store-status {
  position: absolute;
  top: 6px;
  left: 6px;
  padding: 3px 6px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  color: white;
}

.store-status.open {
  background: #16a34a;
}

.store-status.closed {
  background: #dc2626;
}

.store-content {
  padding: 8px;
}

.store-name {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.2;
}

.store-meta {
  font-size: 11px;
  color: #777;
}

.store-rating {
  font-size: 11px;
  color: #f59e0b;
  margin-top: 3px;
}

</style>

<script src="/js/search.js"></script>

</body>
</html>
