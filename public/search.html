<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultados - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">

</head>

<body class="bg-gray-50 text-gray-800">

<!-- =========================
NAV (ESTILO REAL DE TU WEB)
========================= -->
<nav class="bg-white shadow-sm px-4 py-3 flex justify-between items-center">

  <a href="/" class="flex items-center gap-2">
    <img src="/img/logo.png" class="h-7">
  </a>

  <a href="/" class="text-orange-600 font-semibold text-sm">
    Inicio
  </a>

</nav>

<!-- =========================
CONTENIDO
========================= -->
<main class="px-4 py-6">

  <!-- TITLE -->
  <h1 id="searchTitle" class="text-xl font-bold mb-6"></h1>

  <!-- =========================
  PRODUCTOS
  ========================= -->
  <section class="mb-10">

    <h2 class="text-lg font-semibold mb-3">
      🛒 Productos
    </h2>

    <div id="productsResults" class="grid grid-cols-2 gap-4"></div>

  </section>

  <!-- =========================
  TIENDAS
  ========================= -->
  <section>

    <h2 class="text-lg font-semibold mb-3">
      🏪 Tiendas
    </h2>

    <div id="storesResults" class="grid grid-cols-2 gap-4"></div>

  </section>

</main>

<!-- =========================
ESTILOS CARDS (MEJORADOS)
========================= -->
<style>

.store-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.store-card:active {
  transform: scale(0.98);
}

.store-image {
  position: relative;
  height: 140px;
}

.store-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.store-status {
  position: absolute;
  top: 8px;
  left: 8px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  color: white;
}

.store-status.open {
  background: #16a34a;
}

.store-status.closed {
  background: #dc2626;
}

.store-content {
  padding: 10px;
}

.store-name {
  font-size: 14px;
  font-weight: 600;
}

.store-meta {
  font-size: 12px;
  color: #777;
}

.store-rating {
  font-size: 12px;
  color: #f59e0b;
  margin-top: 4px;
}

</style>

<script src="/js/search.js"></script>

</body>
</html>
