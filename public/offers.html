<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ofertas - PuntoCerca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }

    .logo {
      color: #ff6600;
      font-weight: bold;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .img-box {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f3f3;
    }

    .img-box img {
      max-height: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 10px;
    }

    .price {
      color: #ff6600;
      font-weight: bold;
    }

    .store {
      font-size: 12px;
      color: #777;
    }

    .badge {
      background: red;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">PuntoCerca</div>
  <div>
    <a href="/">Inicio</a>
  </div>
</header>

<div class="container">
  <h1>🔥 Ofertas del día</h1>

  <div id="offersGrid" class="grid"></div>
</div>

<script src="/js/offers.js"></script>

</body>
</html>
