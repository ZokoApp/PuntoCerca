<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ofertas - PuntoCerca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

 <style>
  body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
  }

  header {
    background: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
  }

  .logo {
    color: #ff6600;
    font-weight: bold;
    font-size: 20px;
  }

  .container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  h1 {
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid #eee;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  }

  .img-box {
    height: 180px;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-box img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
  }

  .card-body {
    padding: 12px;
  }

  .product-name {
    font-size: 14px;
    margin-bottom: 6px;
    color: #333;
  }

  .price {
    color: #ff6600;
    font-size: 18px;
    font-weight: bold;
  }

  .store {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
  }

  .badge {
    background: #ff3b30;
    color: white;
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 6px;
    margin-left: 6px;
  }

   .old-price {
  text-decoration: line-through;
  color: #999;
  font-size: 13px;
  margin-right: 6px;
}

.price-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
</style>
</head>

<body>

<header>
  <div class="logo">PuntoCerca</div>
  <div>
    <a href="/">Inicio</a>
  </div>
</header>

<div class="container">
  <h1>🔥 Ofertas del día</h1>

  <!-- FILTROS -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
    
    <input 
      type="text" 
      id="searchInput"
      placeholder="Buscar producto..."
      style="padding:10px;border-radius:8px;border:1px solid #ddd;flex:1;"
    />

    <select id="storeFilter" style="padding:10px;border-radius:8px;border:1px solid #ddd;">
      <option value="">Todas las tiendas</option>
    </select>

    <select id="sortPrice" style="padding:10px;border-radius:8px;border:1px solid #ddd;">
      <option value="">Ordenar</option>
      <option value="asc">Precio menor a mayor</option>
      <option value="desc">Precio mayor a menor</option>
    </select>

  </div>

  <div id="offersGrid" class="grid"></div>
</div>
<script src="/js/offers.js"></script>

</body>
</html>
