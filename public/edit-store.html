<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Tienda</title>

<link rel="stylesheet" href="/css/dashboard.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">


</head>

<body class="dashboard-page">

<aside class="dashboard-sidebar">
  <div class="sidebar-brand">PuntoCerca</div>

  <nav class="sidebar-nav">
    <a href="/dashboard" class="sidebar-link">Dashboard</a>
    <a href="#" class="sidebar-link active">Editar tienda</a>
  </nav>
</aside>

<main class="dashboard-main">

  <header class="dashboard-header">
    <h1 class="dashboard-title">Editar tienda</h1>
  </header>

  <section class="panel-card">

    <form id="editStoreForm" class="form-grid">

      <div class="form-group">
        <label>Nombre</label>
        <input id="name" required>
      </div>

      <div class="form-group">
  <label>Categoría</label>
  <select id="category"></select>
</div>

<div class="form-group">
  <label>Subcategoría</label>
  <div id="subcategoryContainer" class="subcategory-container"></div>
</div>

      <div class="form-group">
        <label>Teléfono</label>
        <input id="phone">
      </div>

      <div class="form-group">
        <label>Ciudad</label>
        <input id="city">
      </div>

      <!-- DIRECCIÓN -->
<div class="form-group full">
  <label>Dirección</label>

  <div class="location-box">
    <span id="streetDisplay">Seleccionar ubicación</span>
    <button type="button" id="openMap">📍</button>
  </div>
</div>

<!-- DATOS EXTRA -->
<div class="form-group">
  <label>Local</label>
  <input id="local" placeholder="Ej: Local 3">
</div>

<div class="form-group">
  <label>Piso / Dpto</label>
  <input id="apartment" placeholder="Ej: 2B">
</div>

<div class="form-group full">
  <label>Referencias</label>
  <input id="references" placeholder="Ej: Portón negro, frente a la plaza">
</div>

      <div class="form-group full">
        <label>Descripción</label>
        <textarea id="description"></textarea>
      </div>

       <div class="form-group full">
  <label>Video del local</label>
  <input
    id="videoUrl"
    type="url"
    placeholder="https://www.youtube.com/watch?v=... o https://www.instagram.com/reel/..."
  >
  <p style="font-size:12px;color:#9ca3af;margin-top:6px;">
    Pegá el link de YouTube o Instagram — se mostrará en tu perfil
  </p>
  <div id="videoUrlPreview" style="margin-top:14px;"></div>
</div>

     <div class="form-group full">
  <label class="flex items-center gap-2">
    <input type="checkbox" id="alwaysOpen">
    Siempre abierto (24hs)
  </label>
</div>

<div class="form-group full">
  <label>Horarios de atención</label>

  <div id="hoursContainer" class="hours-container">

    <!-- Lunes -->
    <div class="day-block" data-day="mon">
      <strong>Lunes</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Martes -->
    <div class="day-block" data-day="tue">
      <strong>Martes</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Miércoles -->
    <div class="day-block" data-day="wed">
      <strong>Miércoles</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Jueves -->
    <div class="day-block" data-day="thu">
      <strong>Jueves</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Viernes -->
    <div class="day-block" data-day="fri">
      <strong>Viernes</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Sábado -->
    <div class="day-block" data-day="sat">
      <strong>Sábado</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

    <!-- Domingo -->
    <div class="day-block" data-day="sun">
      <strong>Domingo</strong>

      <div class="ranges">
        <div class="range">
          <input type="time" class="open">
          <input type="time" class="close">
        </div>
      </div>

      <button type="button" class="add-range">+ Agregar horario</button>
    </div>

  </div>
</div>

   

      <!-- LOGO -->
<div class="upload-box" id="logoBox">
  <img id="logoPreview" src="" alt="Logo">
  <span>Cambiar logo</span>
  <input type="file" id="logoFile" accept="image/*">
</div>

<!-- PORTADA -->
<div class="upload-box cover" id="coverBox">
  <img id="coverPreview" src="" alt="Portada">
  <span>Cambiar portada</span>
  <input type="file" id="coverFile" accept="image/*">
</div>
     <!-- REDES SOCIALES -->
      <div class="form-group full" style="margin-bottom:8px;">
        <label>Redes sociales y web</label>

        <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">

          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:10px;background:#fce4ec;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#e91e63"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </div>
            <input id="instagramUrl" type="url" placeholder="https://instagram.com/tu_tienda"
              style="flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"
              onfocus="this.style.borderColor='#ea580c'" onblur="this.style.borderColor='#e5e7eb'">
          </div>

          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#000000"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>
            </div>
            <input id="tiktokUrl" type="url" placeholder="https://tiktok.com/@tu_tienda"
              style="flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"
              onfocus="this.style.borderColor='#ea580c'" onblur="this.style.borderColor='#e5e7eb'">
          </div>

          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:10px;background:#e3f2fd;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#1877f2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </div>
            <input id="facebookUrl" type="url" placeholder="https://facebook.com/tu_tienda"
              style="flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"
              onfocus="this.style.borderColor='#ea580c'" onblur="this.style.borderColor='#e5e7eb'">
          </div>

          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#374151"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253M3 12a8.959 8.959 0 01.284-2.253"/></svg>
            </div>
            <input id="websiteUrl" type="url" placeholder="https://tu-sitio-web.com"
              style="flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"
              onfocus="this.style.borderColor='#ea580c'" onblur="this.style.borderColor='#e5e7eb'">
          </div>

        </div>
      </div>

      <button class="btn-primary full">Guardar cambios</button>

    </form>

  </section>

</main>

<div id="mapModal" class="map-modal hidden">

  <div class="map-content">

    <!-- HEADER -->
    <div class="map-header">
      <h3>Ubicación de la tienda</h3>
      <button id="closeMap" class="map-close">✕</button>
    </div>

    <!-- BUSCADOR -->
    <div class="map-search">
      <input id="searchAddress" placeholder="Buscar dirección o zona...">
    </div>

    <!-- MAPA -->
    <div id="map" class="map-box"></div>

    <!-- FOOTER -->
    <div class="map-footer">
      <button id="saveLocation" class="btn-save-location">
        Guardar ubicación
      </button>
    </div>

  </div>

</div>

   <div id="toastContainer" class="fixed top-5 right-5 z-[9999] space-y-3"></div>
   <script src="/js/delivery-monitor.js"></script>

<script type="module" src="/js/edit-store.js"></script>

</body>
</html>
