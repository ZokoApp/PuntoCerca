<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50">

<!-- NAV -->
<nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
  <div class="text-orange-600 font-bold text-xl">PuntoLocal</div>
  <a href="/" class="text-gray-600 hover:text-orange-500">Inicio</a>
</nav>

<!-- CONTENEDOR -->
<div class="max-w-5xl mx-auto mt-10 space-y-6">

  <!-- HEADER -->
  <div class="bg-white rounded-xl shadow p-6 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">Mi perfil</h1>
      <p class="text-gray-500 text-sm">Gestioná tu cuenta</p>
    </div>
  </div>

  <!-- INFO USUARIO -->
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Información</h2>

    <div class="mb-6 flex items-center gap-4">

  <img id="avatarPreview"
    src="/img/default-avatar.png"
    class="w-16 h-16 rounded-full object-cover border">

  <div>
    <input type="file" id="avatarInput" accept="image/*"
      class="text-sm">

    <p class="text-xs text-gray-400 mt-1">
      JPG, PNG o WEBP
    </p>
  </div>

</div>

    <div class="grid md:grid-cols-2 gap-4 text-sm">

      <div>
        <p class="text-gray-500">Nombre</p>
        <input id="nameInput" class="border rounded-lg p-2 w-full mt-1">
      </div>

      <div>
        <p class="text-gray-500">Email</p>
        <p id="userEmail" class="font-medium mt-2"></p>
      </div>

      <div>
        <p class="text-gray-500">Tipo</p>
        <p id="userRole" class="font-medium mt-2"></p>
      </div>

      <div>
        <p class="text-gray-500">Nueva contraseña</p>
        <input id="passwordInput" type="password" placeholder="Opcional"
          class="border rounded-lg p-2 w-full mt-1">
      </div>

    </div>

    <button id="saveProfileBtn"
      class="mt-6 bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600">
      Guardar cambios
    </button>
  </div>

  <!-- FAVORITOS -->
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Tiendas favoritas</h2>
    <div id="favoritesList" class="grid gap-4"></div>
  </div>

  <!-- SIGUIENDO -->
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Tiendas que sigues</h2>
    <div id="followingList" class="grid gap-4"></div>
  </div>

  <!-- ZONA PELIGROSA -->
  <div class="bg-white rounded-xl shadow p-6 border border-red-200">
    <h2 class="text-lg font-semibold mb-4 text-red-600">Zona peligrosa</h2>

    <button id="deleteAccountBtn"
      class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
      Eliminar mi cuenta
    </button>
  </div>

</div>

<script>
async function loadProfile(){
  try{
    const res = await fetch("/api/me", {
      credentials:"include"
    });

    if(!res.ok){
      window.location.href = "/login";
      return;
    }

    const user = await res.json();

    document.getElementById("nameInput").value = user.name;
    document.getElementById("userEmail").innerText = user.email;
    document.getElementById("userRole").innerText = user.role;
    if (user.avatar_url) {
  document.getElementById("avatarPreview").src = user.avatar_url;
}

  }catch(err){
    console.error(err);
  }
}

  document.getElementById("avatarInput").addEventListener("change", (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const preview = document.getElementById("avatarPreview");
  preview.src = URL.createObjectURL(file);

});

  async function uploadAvatar() {

  const input = document.getElementById("avatarInput");

  if (!input.files.length) return;

  const formData = new FormData();
  formData.append("avatar", input.files[0]);

  try {
    const res = await fetch("/api/users/avatar", {
      method: "PUT",
      credentials: "include",
      body: formData
    });

    if (!res.ok) throw new Error();

    const data = await res.json();

    console.log("Avatar actualizado:", data);

  } catch (err) {
    console.error(err);
    alert("Error subiendo avatar");
  }
}

async function loadFavorites(){
  try{
    const res = await fetch("/api/favorites", {
      credentials:"include"
    });

    const stores = await res.json();

    const container = document.getElementById("favoritesList");

    if(!stores.length){
      container.innerHTML = "<p class='text-gray-500'>No tienes favoritos aún</p>";
      return;
    }

    stores.forEach(store => {
      const div = document.createElement("div");

      div.className = "flex justify-between items-center border rounded-lg p-3 hover:shadow transition";

      div.innerHTML = `
        <div>
          <strong>${store.name}</strong><br>
          <span class="text-sm text-gray-500">${store.city || ""}</span>
        </div>

        <button 
          onclick="goToStore(${store.id})"
          class="text-sm bg-orange-500 text-white px-3 py-1 rounded-lg hover:bg-orange-600"
        >
          Ver
        </button>
      `;

      container.appendChild(div);
    });

  }catch(err){
    console.error(err);
  }
}

async function loadFollowing(){
  try{
    const res = await fetch("/api/following", {
      credentials:"include"
    });

    const stores = await res.json();

    const container = document.getElementById("followingList");

    if(!stores.length){
      container.innerHTML = "<p class='text-gray-500'>No sigues tiendas aún</p>";
      return;
    }

    stores.forEach(store => {
      const div = document.createElement("div");

      div.className = "flex justify-between items-center border rounded-lg p-3 hover:shadow transition";

      div.innerHTML = `
        <div>
          <strong>${store.name}</strong>
        </div>

        <div class="flex gap-2">
          <button 
            onclick="goToStore(${store.id})"
            class="text-sm bg-gray-200 px-3 py-1 rounded-lg hover:bg-gray-300"
          >
            Ver
          </button>

          <button 
            onclick="unfollow(${store.id})"
            class="text-sm bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600"
          >
            Dejar
          </button>
        </div>
      `;

      container.appendChild(div);
    });

  }catch(err){
    console.error(err);
  }
}

// acciones
function goToStore(id){
  window.location.href = `/store/${id}`;
}

async function unfollow(id){
  await fetch(`/api/follow/${id}`, {
    method:"DELETE",
    credentials:"include"
  });

  loadFollowing();
}

// GUARDAR PERFIL
document.getElementById("saveProfileBtn").addEventListener("click", async () => {

  const name = document.getElementById("nameInput").value;
  const password = document.getElementById("passwordInput").value;

  try {
    const res = await fetch("/api/users/me", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "include",
      body: JSON.stringify({
        name,
        password
      })
    });

    if (!res.ok) throw new Error();

    alert("Perfil actualizado");

  } catch (err) {
    console.error(err);
    alert("Error actualizando perfil");
  }

  await uploadAvatar();

});

// ELIMINAR CUENTA
document.getElementById("deleteAccountBtn").addEventListener("click", async () => {

  const confirmDelete = confirm("¿Seguro que querés eliminar tu cuenta?");

  if (!confirmDelete) return;

  try {
    const res = await fetch("/api/users/me", {
      method: "DELETE",
      credentials: "include"
    });

    if (!res.ok) throw new Error();

    alert("Cuenta eliminada");

    window.location.href = "/";

  } catch (err) {
    console.error(err);
    alert("Error eliminando cuenta");
  }

});

// INIT
loadProfile();
loadFavorites();
loadFollowing();
</script>

</body>
</html>
