<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo producto</title>

<link rel="stylesheet" href="/css/output.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50">

<!-- NAV -->
<nav class="bg-white border-b shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <a href="/" class="text-xl font-bold text-orange-600">PuntoCerca</a>
  </div>
</nav>

<!-- CONTENIDO -->
<main class="max-w-3xl mx-auto px-6 py-10">

  <div class="bg-white rounded-2xl shadow-sm border p-8">

    <h1 class="text-2xl font-bold mb-6">Crear nuevo producto</h1>

    <form id="productForm" class="space-y-4">

      <input type="text" id="name" placeholder="Nombre"
        class="w-full border rounded-lg p-3">

      <input type="number" id="price" placeholder="Precio"
        class="w-full border rounded-lg p-3">

      <input type="text" id="brand" placeholder="Marca"
        class="w-full border rounded-lg p-3">

      <input type="text" id="size" placeholder="Talles (ej: 40,41,42)"
        class="w-full border rounded-lg p-3">

      <div>
  <label class="text-sm text-gray-600">Colores disponibles</label>

  <select id="colors" multiple
    class="w-full border rounded-lg p-3 h-32">

    <option value="Negro">Negro</option>
    <option value="Blanco">Blanco</option>
    <option value="Gris">Gris</option>
    <option value="Azul">Azul</option>
    <option value="Rojo">Rojo</option>
    <option value="Verde">Verde</option>
    <option value="Amarillo">Amarillo</option>
    <option value="Rosa">Rosa</option>
    <option value="Marrón">Marrón</option>
    <option value="Beige">Beige</option>
    <option value="Naranja">Naranja</option>
    <option value="Violeta">Violeta</option>
    <option value="Plateado">Plateado</option>
    <option value="Dorado">Dorado</option>

  </select>

  <p class="text-xs text-gray-400 mt-1">
    Mantén Ctrl (o Cmd en Mac) para seleccionar varios
  </p>
</div>

        <input type="file" id="productImages" multiple accept="image/*">  

      <select id="category" class="w-full border rounded-lg p-3">

  <option value="">Seleccionar categoría</option>

  <optgroup label="COMERCIO">
    <option>Ropa y moda</option>
    <option>Calzado</option>
    <option>Accesorios</option>
    <option>Electrónica</option>
    <option>Electrodomésticos</option>
    <option>Celulares</option>
    <option>Computación</option>
    <option>Hogar y decoración</option>
    <option>Muebles</option>
    <option>Iluminación</option>
    <option>Ferretería</option>
    <option>Construcción</option>
    <option>Pinturería</option>
    <option>Juguetería</option>
    <option>Librería</option>
    <option>Deportes y fitness</option>
    <option>Mascotas</option>
    <option>Perfumería</option>
    <option>Cosmética</option>
    <option>Regalería</option>
  </optgroup>

  <optgroup label="GASTRONOMÍA">
    <option>Restaurantes</option>
    <option>Comida rápida</option>
    <option>Pizzerías</option>
    <option>Heladerías</option>
    <option>Panaderías</option>
    <option>Cafeterías</option>
    <option>Rotiserías</option>
    <option>Comida casera</option>
    <option>Dietética</option>
  </optgroup>

  <optgroup label="BELLEZA Y CUIDADO PERSONAL">
    <option>Peluquerías</option>
    <option>Barberías</option>
    <option>Estética</option>
    <option>Uñas</option>
    <option>Spa</option>
    <option>Masajes</option>
  </optgroup>

  <optgroup label="SALUD">
    <option>Farmacias</option>
    <option>Clínicas</option>
    <option>Consultorios</option>
    <option>Odontología</option>
    <option>Kinesiología</option>
    <option>Psicología</option>
  </optgroup>

  <optgroup label="SERVICIOS">
    <option>Electricistas</option>
    <option>Plomeros</option>
    <option>Gasistas</option>
    <option>Técnicos en refrigeración</option>
    <option>Mecánicos</option>
    <option>Cerrajeros</option>
    <option>Albañiles</option>
    <option>Carpinteros</option>
    <option>Pintores</option>
    <option>Fumigación</option>
    <option>Limpieza</option>
    <option>Mudanzas</option>
    <option>Seguridad</option>
  </optgroup>

  <optgroup label="AUTOMOTOR">
    <option>Talleres mecánicos</option>
    <option>Gomerías</option>
    <option>Repuestos</option>
    <option>Lavaderos</option>
    <option>Accesorios</option>
  </optgroup>

  <optgroup label="PROFESIONALES">
    <option>Abogados</option>
    <option>Contadores</option>
    <option>Arquitectos</option>
    <option>Diseñadores</option>
    <option>Programadores</option>
    <option>Marketing</option>
  </optgroup>

  <optgroup label="EDUCACIÓN">
    <option>Institutos</option>
    <option>Clases particulares</option>
    <option>Cursos</option>
  </optgroup>

  <optgroup label="EVENTOS">
    <option>Salones</option>
    <option>Catering</option>
    <option>Fotografía</option>
    <option>Sonido e iluminación</option>
  </optgroup>

  <optgroup label="VARIOS">
    <option>Emprendimientos</option>
    <option>Servicios varios</option>
  </optgroup>

</select>

      <input type="number" id="stock" placeholder="Stock"
        class="w-full border rounded-lg p-3">

      <input type="text" id="image_url" placeholder="URL imagen (Opcional)"
        class="w-full border rounded-lg p-3">

      <textarea id="extra" placeholder="Descripción"
  class="w-full border rounded-lg p-3"></textarea>

<label class="flex items-center gap-2 text-sm text-gray-700">
  <input type="checkbox" id="isOffer">
  Producto de oferta
</label>

<button
  class="w-full bg-orange-600 text-white py-3 rounded-xl font-semibold">
  Crear producto
</button>

    </form>

  </div>

</main>

<script src="/js/new-product.js"></script>

</body>
</html>
