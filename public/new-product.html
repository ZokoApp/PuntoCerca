<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo producto</title>

<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50">

<!-- NAV -->
<nav class="bg-white border-b shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <a href="/" class="text-xl font-bold text-orange-600">PuntoCerca</a>
  </div>
</nav>

<!-- CONTENIDO -->
<main class="max-w-3xl mx-auto px-6 py-10">

  <div class="bg-white rounded-2xl shadow-sm border p-8">

    <h1 class="text-2xl font-bold mb-6">Crear nuevo producto</h1>

    <form id="productForm" class="space-y-4">

      <!-- NOMBRE -->
      <input type="text" id="name" placeholder="Nombre del producto"
        class="w-full border rounded-lg p-3">

      <!-- PRECIO -->
      <input type="number" id="price" placeholder="Precio"
        class="w-full border rounded-lg p-3">

      <!-- MARCA -->
      <input type="text" id="brand" placeholder="Marca"
        class="w-full border rounded-lg p-3">

      <!-- MODELO -->
      <input type="text" id="model" placeholder="Modelo"
        class="w-full border rounded-lg p-3">

      <!-- CAMPOS DINÁMICOS -->
      <div class="space-y-3">

        <!-- TALLES -->
        <label class="flex items-center gap-2">
          <input type="checkbox" id="checkSizes"> Talles
        </label>

        <div id="sizesField" class="hidden">
          <input type="text" id="sizes"
            placeholder="Ej: 40,41,42"
            class="w-full border rounded-lg p-3">
        </div>

        <!-- COLORES -->
        <label class="flex items-center gap-2">
          <input type="checkbox" id="checkColors"> Colores
        </label>

        <div id="colorsField" class="hidden">
          <select id="colors" multiple
            class="w-full border rounded-lg p-3 h-32">

            <option>Negro</option>
            <option>Blanco</option>
            <option>Gris</option>
            <option>Azul</option>
            <option>Rojo</option>
            <option>Verde</option>
            <option>Amarillo</option>
            <option>Rosa</option>
            <option>Marrón</option>
            <option>Beige</option>

          </select>

          <p class="text-xs text-gray-400 mt-1">
            Mantén Ctrl (o Cmd en Mac) para seleccionar varios
          </p>
        </div>

        <!-- SKU -->
        <label class="flex items-center gap-2">
          <input type="checkbox" id="checkSKU"> SKU
        </label>

        <div id="skuField" class="hidden">
          <input type="text" id="sku"
            placeholder="Código SKU"
            class="w-full border rounded-lg p-3">
        </div>

        <!-- MATERIAL -->
        <label class="flex items-center gap-2">
          <input type="checkbox" id="checkMaterial"> Material
        </label>

        <div id="materialField" class="hidden">
          <input type="text" id="material"
            placeholder="Material"
            class="w-full border rounded-lg p-3">
        </div>

      </div>

      <!-- IMÁGENES -->
      <input type="file" id="productImages" multiple accept="image/*">

      <!-- CATEGORÍA -->
      <select id="category" class="w-full border rounded-lg p-3">
        <option value="">Seleccionar categoría</option>
        <option>Ropa</option>
        <option>Electrónica</option>
        <option>Hogar</option>
        <option>Servicios</option>
        <option>Gastronomía</option>
      </select>

      <!-- URL OPCIONAL -->
      <input type="text" id="image_url" placeholder="URL imagen (opcional)"
        class="w-full border rounded-lg p-3">

      <!-- DESCRIPCIÓN -->
      <textarea id="description" placeholder="Descripción"
        class="w-full border rounded-lg p-3"></textarea>

      <!-- OFERTA -->
      <label class="flex items-center gap-2 text-sm text-gray-700">
        <input type="checkbox" id="isOffer">
        Producto de oferta
      </label>

      <!-- BOTÓN -->
      <button
        class="w-full bg-orange-600 text-white py-3 rounded-xl font-semibold">
        Crear producto
      </button>

    </form>

  </div>

</main>

<script src="/js/new-product.js"></script>

</body>
</html>
