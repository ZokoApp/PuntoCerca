<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dashboard - PuntoCerca</title>
<link rel="icon" type="image/png" href="/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;color:#111827;}

.navbar{background:white;border-bottom:1px solid #e5e7eb;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.navbar-brand{font-size:20px;font-weight:900;text-decoration:none;letter-spacing:-0.03em;color:#111;}
.navbar-brand span{color:#ea580c;}
.navbar-right{display:flex;align-items:center;gap:12px;}
.navbar-link{font-size:13px;color:#6b7280;text-decoration:none;font-weight:500;}
.navbar-link:hover{color:#ea580c;}
.btn-profile{background:#fff7ed;border:1px solid #fed7aa;color:#ea580c;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.15s;}
.btn-profile:hover{background:#ffedd5;}

.container{max-width:960px;margin:0 auto;padding:32px 16px 60px;}

.page-header{margin-bottom:28px;}
.page-header h1{font-size:22px;font-weight:800;color:#111827;letter-spacing:-0.03em;}
.page-header p{font-size:14px;color:#9ca3af;margin-top:4px;}

.card{background:white;border:1px solid #e5e7eb;border-radius:20px;padding:28px;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;color:#111827;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* ACCOUNT */
.account-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:600px){.account-grid{grid-template-columns:1fr;}}
.account-item label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;}
.account-item p{font-size:14px;font-weight:600;color:#111827;}

/* STORE CARDS */
.stores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.store-card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.15s;}
.store-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-2px);}
.store-card-img{width:100%;height:100px;object-fit:cover;background:#f1f5f9;display:flex;align-items:center;justify-content:center;}
.store-card-img img{width:100%;height:100%;object-fit:cover;}
.store-card-body{padding:12px 14px;}
.store-card-name{font-size:13px;font-weight:700;color:#111827;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.store-card-city{font-size:11px;color:#9ca3af;margin-bottom:10px;}
.store-card-actions{display:flex;gap:7px;}
.btn-see{background:white;border:1px solid #e5e7eb;color:#374151;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;}
.btn-see:hover{background:#f9fafb;}
.btn-unfollow{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;}
.btn-unfollow:hover{background:#fee2e2;}

/* PRODUCT CARDS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.product-card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.15s;}
.product-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-2px);}
.product-card img{width:100%;height:110px;object-fit:cover;}
.product-card-body{padding:10px 12px;}
.product-card-name{font-size:12px;font-weight:600;color:#111827;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.product-card-price{font-size:13px;font-weight:800;color:#ea580c;}

.empty-state{text-align:center;padding:32px 16px;color:#9ca3af;}
.empty-state svg{width:36px;height:36px;margin:0 auto 10px;display:block;opacity:0.35;}
.empty-state p{font-size:14px;}

/* TOAST */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{background:#111827;color:white;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:toastIn 0.3s ease;}
.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand"><span>Punto</span>Cerca</a>
  <div class="navbar-right">
    <a href="/" class="navbar-link">Inicio</a>
    <a href="/profile" class="btn-profile">Mi perfil</a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1>Mi Dashboard</h1>
    <p id="welcomeMsg">Bienvenido a PuntoCerca</p>
  </div>

  <!-- CUENTA -->
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ea580c">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
      </svg>
      Mi cuenta
    </div>
    <div class="account-grid">
      <div class="account-item">
        <label>Nombre</label>
        <p id="userName">—</p>
      </div>
      <div class="account-item">
        <label>Email</label>
        <p id="userEmail">—</p>
      </div>
      <div class="account-item">
        <label>Tipo</label>
        <p id="userRole">—</p>
      </div>
    </div>
  </div>

  <!-- SIGUIENDO -->
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ea580c">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 2.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z" />
      </svg>
      Tiendas que seguís
    </div>
    <div id="followingList"></div>
  </div>

  <!-- PRODUCTOS GUARDADOS -->
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ea580c">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
      </svg>
      Productos guardados
    </div>
    <div id="productsList"></div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
function showToast(msg, type='success'){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

function formatPrice(p){
  if(p===null||p===undefined||p==='') return 'Consultar';
  const n = Number(p);
  return isNaN(n) ? 'Consultar' : '$'+n.toLocaleString('es-AR');
}

async function loadUser(){
  try{
    const res = await fetch('/api/me',{credentials:'include'});
    if(!res.ok){ window.location.href='/login'; return; }
    const u = await res.json();
    document.getElementById('userName').textContent = u.name||'—';
    document.getElementById('userEmail').textContent = u.email||'—';
    document.getElementById('userRole').textContent = u.role==='user'?'Comprador':u.role==='seller'?'Vendedor':u.role||'—';
    document.getElementById('welcomeMsg').textContent = `Hola, ${u.name || 'usuario'} 👋`;
  }catch(err){ console.error(err); }
}

async function loadFollowing(){
  try{
    const res = await fetch('/api/following',{credentials:'include'});
    const stores = await res.json();
    const c = document.getElementById('followingList');
    if(!stores.length){
      c.innerHTML = `<div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 2.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z" /></svg>
        <p>Todavía no seguís ninguna tienda</p>
      </div>`;
      return;
    }
    c.innerHTML = `<div class="stores-grid" id="storesGrid"></div>`;
    const grid = document.getElementById('storesGrid');
    stores.forEach(s=>{
      const div = document.createElement('div');
      div.className = 'store-card';
      div.innerHTML = `
        <div class="store-card-img">
          <img src="${s.logo_url||'/img/favicon.png'}" alt="${s.name}"
            onerror="this.style.display='none'">
        </div>
        <div class="store-card-body">
          <div class="store-card-name">${s.name}</div>
          <div class="store-card-city">${s.city||s.category||''}</div>
          <div class="store-card-actions">
            <a href="/${s.slug||'store/'+s.id}" class="btn-see">Ver tienda</a>
            <button class="btn-unfollow" data-id="${s.id}">Dejar</button>
          </div>
        </div>
      `;
      div.querySelector('.btn-unfollow').addEventListener('click', async(e)=>{
        e.stopPropagation();
        await unfollow(s.id);
      });
      div.addEventListener('click', ()=>{ window.location.href=`/${s.slug||'store/'+s.id}`; });
      grid.appendChild(div);
    });
  }catch(err){ console.error(err); }
}

async function loadFavoriteProducts(){
  try{
    const res = await fetch('/api/product-favorites',{credentials:'include'});
    if(!res.ok){ document.getElementById('productsList').innerHTML='<div class="empty-state"><p>No guardaste productos</p></div>'; return; }
    const products = await res.json();
    const c = document.getElementById('productsList');
    if(!products.length){
      c.innerHTML = `<div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
        <p>Todavía no guardaste ningún producto</p>
      </div>`;
      return;
    }
    c.innerHTML = '<div class="products-grid" id="productsGrid"></div>';
    const grid = document.getElementById('productsGrid');
    products.forEach(p=>{
      const div = document.createElement('div');
      div.className = 'product-card';
      div.innerHTML = `
        <img src="${p.image_url||'/img/favicon.png'}" alt="${p.name}"
          onerror="this.src='/img/favicon.png'">
        <div class="product-card-body">
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-price">${formatPrice(p.price)}</div>
        </div>
      `;
      div.onclick = ()=>{ window.location.href=`/product/${p.id}`; };
      grid.appendChild(div);
    });
  }catch(err){ console.error(err); }
}

async function unfollow(id){
  try{
    await fetch(`/api/follow/${id}`,{method:'DELETE',credentials:'include'});
    showToast('Dejaste de seguir la tienda','success');
    loadFollowing();
  }catch(err){ showToast('Error','error'); }
}

loadUser();
loadFollowing();
loadFavoriteProducts();
</script>
</body>
</html>
