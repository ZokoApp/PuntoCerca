<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar producto</title>
  <link rel="stylesheet" href="/css/output.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

  <h2 class="text-2xl font-bold mb-4">Editar producto</h2>

  <form id="editProductForm" class="space-y-3">

    <input id="name" placeholder="Nombre" class="w-full border p-2 rounded" />

<input id="price" placeholder="Precio actual" class="w-full border p-2 rounded" />

<input id="old_price" placeholder="Precio anterior" class="w-full border p-2 rounded" />

<input id="brand" placeholder="Marca" class="w-full border p-2 rounded" />
<input id="size" placeholder="Talles" class="w-full border p-2 rounded" />
<input id="stock" placeholder="Stock" class="w-full border p-2 rounded" />

    <select id="category" class="w-full border p-2 rounded">
      <option value="">Categoría</option>
      <option>Ropa y moda</option>
      <option>Electrónica</option>
      <option>Hogar</option>
    </select>

    <label>
      <input type="checkbox" id="isOffer">
      Producto en oferta
    </label>

    <input type="file" id="images" multiple class="w-full" />

    <textarea id="extra" placeholder="Descripción" class="w-full border p-2 rounded"></textarea>

    <button class="bg-orange-600 text-white w-full py-2 rounded">
      Guardar cambios
    </button>

  </form>

</div>

<script src="/js/edit-product.js"></script>

</body>
</html>
