<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar producto</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
  <h1 class="text-xl font-bold text-orange-600">Editar producto</h1>

  <a href="/dashboard"
     class="text-sm text-gray-600 hover:text-orange-600">
     ← Volver
  </a>
</header>

<!-- CONTENEDOR -->
<div class="max-w-3xl mx-auto mt-8 bg-white p-6 rounded-2xl shadow">

  <!-- INFO PRODUCTO -->
  <div class="mb-6 border-b pb-4">
    <p class="text-sm text-gray-500">Estás editando:</p>
    <h2 id="productTitlePreview" class="text-lg font-semibold text-gray-800">
      Cargando...
    </h2>
  </div>

  <form id="editProductForm" class="space-y-5">

    <!-- NOMBRE -->
    <div>
      <label class="text-sm font-medium text-gray-700">Nombre</label>
      <input id="name"
        class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-orange-500"
        required />
    </div>

    <!-- PRECIOS -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm font-medium text-gray-700">Precio actual</label>
        <input id="price" type="number"
          class="w-full border p-3 rounded-lg"
          required />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">Precio anterior</label>
        <input id="old_price" type="number"
          class="w-full border p-3 rounded-lg" />
      </div>
    </div>

    <!-- DETALLES -->
    <div class="grid grid-cols-2 gap-4">
      <input id="brand" placeholder="Marca"
        class="border p-3 rounded-lg" />

      <input id="size" placeholder="Talle / Tamaño"
        class="border p-3 rounded-lg" />
    </div>

    <input id="stock" type="number" placeholder="Stock disponible"
      class="w-full border p-3 rounded-lg" />

    <!-- CATEGORIA -->
    <div>
      <label class="text-sm font-medium text-gray-700">Categoría</label>
      <select id="category"
        class="w-full border p-3 rounded-lg">
        <option value="">Seleccionar</option>
        <option>Ropa y moda</option>
        <option>Electrónica</option>
        <option>Hogar</option>
      </select>
    </div>

    <!-- OFERTA -->
    <div class="flex items-center justify-between bg-orange-50 p-3 rounded-lg">
      <span class="text-sm text-gray-700">
        Activar oferta (24hs)
      </span>
      <input type="checkbox" id="isOffer"
        class="w-5 h-5 accent-orange-600" />
    </div>

    <!-- IMÁGENES -->
    <div>
      <label class="text-sm font-medium text-gray-700">
        Imágenes
      </label>

      <input type="file" id="images" multiple class="w-full mt-2" />

      <div id="previewImages"
        class="flex gap-2 mt-3 flex-wrap">
      </div>
    </div>

    <!-- DESCRIPCIÓN -->
    <div>
      <label class="text-sm font-medium text-gray-700">Descripción</label>
      <textarea id="extra"
        class="w-full border p-3 rounded-lg"
        rows="4"></textarea>
    </div>

    <!-- BOTONES -->
    <div class="flex gap-3">

      <button id="saveBtn"
        class="bg-orange-600 hover:bg-orange-700 text-white w-full py-3 rounded-lg font-semibold transition">
        Guardar cambios
      </button>

      <a id="viewProductBtn"
        class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-3 rounded-lg text-center">
        Ver producto
      </a>

    </div>

  </form>

</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay"
  class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white px-6 py-4 rounded-lg shadow">
    Guardando cambios...
  </div>
</div>

<script type="module" src="/js/edit-product.js"></script>

</body>
</html>
