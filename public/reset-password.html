<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restablecer contraseña - PuntoCerca</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-sm text-center">

    <h2 class="text-2xl font-bold text-orange-600 mb-4">
      Nueva contraseña
    </h2>

    <p class="text-gray-500 mb-4">
      Ingresá tu nueva contraseña
    </p>

    <input
      type="password"
      id="password"
      placeholder="Nueva contraseña"
      class="w-full p-3 border rounded-lg mb-4"
    />

    <button
      onclick="resetPassword()"
      class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-full font-semibold"
    >
      Cambiar contraseña
    </button>

  </div>
  <script type="module">
  import { showToast } from "/js/utils/toast.js";
  window.showToast = showToast;
</script>

<script>
let csrfToken = null;

async function getCsrfToken() {
  const response = await fetch("/api/csrf-token", {
    credentials: "include"
  });
  const data = await response.json();
  csrfToken = data.csrfToken;
}

async function resetPassword() {
  const password = document.getElementById("password").value.trim();

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    showToast("Token inválido o ausente", "error");
    return;
  }

  if (!password || password.length < 6) {
    showToast("La contraseña debe tener al menos 6 caracteres", "warning");
    return;
  }

  try {
    if (!csrfToken) {
      await getCsrfToken();
    }

    const response = await fetch("/api/reset-password", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "x-csrf-token": csrfToken
      },
      body: JSON.stringify({ token, password })
    });

    const result = await response.json();

    if (!response.ok) {
      showToast(result.error || "Error al cambiar contraseña", "error");
      return;
    }

    showToast("Contraseña actualizada correctamente", "success");

    setTimeout(() => {
      window.location.href = "/login";
    }, 1500);

  } catch (error) {
    console.error(error);
    showToast("Error de conexión con el servidor", "error");
  }
}

window.resetPassword = resetPassword;

getCsrfToken();
</script>

</body>
</html>
