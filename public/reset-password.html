<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restablecer contraseña - PuntoCerca</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-sm text-center">

    <h2 class="text-2xl font-bold text-orange-600 mb-4">
      Nueva contraseña
    </h2>

    <p class="text-gray-500 mb-4">
      Ingresá tu nueva contraseña
    </p>

    <input
      type="password"
      id="password"
      placeholder="Nueva contraseña"
      class="w-full p-3 border rounded-lg mb-4"
    />

    <button
      onclick="resetPassword()"
      class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-full font-semibold"
    >
      Cambiar contraseña
    </button>

  </div>

</body>
</html>
