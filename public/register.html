<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - PuntoCerca</title>
<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b border-white/20 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="text-2xl font-bold text-orange-600">PuntoCerca</div>
    <a href="/" class="text-gray-700 hover:text-orange-600 transition">Inicio</a>
  </div>
</nav>

<!-- CONTENIDO -->
<section class="flex-grow py-20">
  <div class="max-w-3xl mx-auto px-6">
    <div class="bg-white rounded-2xl shadow-xl p-10">

      <h2 class="text-3xl font-bold text-orange-600 mb-8">Crear Cuenta</h2>

      <!-- ROLE SELECTOR -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <button type="button"
          class="role-btn border-2 border-orange-500 bg-orange-50 rounded-xl py-4 font-semibold transition"
          data-role="user">Usuario</button>
        <button type="button"
          class="role-btn border-2 border-gray-300 rounded-xl py-4 font-semibold transition hover:border-orange-400"
          data-role="seller">Vendedor</button>
      </div>

      <form id="registerForm" class="space-y-6">

        <input type="text" id="name" placeholder="Nombre completo"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <input type="email" id="email" placeholder="Email"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <div class="relative">
          <input type="password" id="password" placeholder="Contraseña"
            class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none pr-12"
            required>
          <button type="button" onclick="togglePass('password', 'eye1')"
            style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:0;display:flex;align-items:center;">
            <svg id="eye1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>

        <div class="relative">
          <input type="password" id="confirmPassword" placeholder="Confirmar contraseña"
            class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none pr-12"
            required>
          <button type="button" onclick="togglePass('confirmPassword', 'eye2')"
            style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:0;display:flex;align-items:center;">
            <svg id="eye2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>

        <button type="submit"
          class="w-full bg-orange-600 text-white py-4 rounded-full font-semibold hover:bg-orange-700 transition shadow-md hover:shadow-lg">
          Registrarse
        </button>

      </form>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-300 py-6">
  <div class="max-w-7xl mx-auto px-6 text-center text-sm">
    ©️ 2026 PuntoCerca - Plataforma de comercios locales
  </div>
</footer>

<div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:999999;display:flex;flex-direction:column;gap:10px;"></div>

<script>

function showToast(message, type = "success") {
  const bg = { success: "#22c55e", error: "#ef4444", warning: "#f59e0b", info: "#3b82f6" };
  const toast = document.createElement("div");
  toast.style.cssText = `background:${bg[type]};color:white;padding:14px 20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;min-width:260px;`;
  toast.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:white;font-size:18px;cursor:pointer;">✕</button>`;
  document.getElementById("toastContainer").appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function togglePass(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  const isHidden = input.type === "password";
  input.type = isHidden ? "text" : "password";
  icon.innerHTML = isHidden
    ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`
    : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
}

let csrfToken = null;

async function getCsrfToken() {
  const response = await fetch("/api/csrf-token", { credentials: "include" });
  const data = await response.json();
  csrfToken = data.csrfToken;
}

let selectedRole = "user";

document.querySelectorAll(".role-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".role-btn").forEach(b => {
      b.classList.remove("border-orange-500", "bg-orange-50");
      b.classList.add("border-gray-300");
    });
    this.classList.add("border-orange-500", "bg-orange-50");
    this.classList.remove("border-gray-300");
    selectedRole = this.dataset.role;
  });
});

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!csrfToken) await getCsrfToken();

  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    showToast("Las contraseñas no coinciden", "warning");
    return;
  }

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: password,
    role: selectedRole
  };

  const response = await fetch('/api/register', {
    method: 'POST',
    credentials: "include",
    headers: {
      'Content-Type': 'application/json',
      'x-csrf-token': csrfToken
    },
    body: JSON.stringify(data)
  });

  const result = await response.json();

  if (!response.ok) {
    showToast(result.error || "Error en registro", "error");
    return;
  }

  showToast("Revisá tu email para confirmar tu cuenta", "success");
  setTimeout(() => window.location.href = "/", 2000);
});

getCsrfToken();

</script>

</body>
</html>
