<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b border-white/20 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="text-2xl font-bold text-orange-600">
      PuntoCerca
    </div>
    <a href="/" class="text-gray-700 hover:text-orange-600 transition">
      Inicio
    </a>
  </div>
</nav>

<!-- CONTENIDO -->
<section class="flex-grow py-20">
  <div class="max-w-3xl mx-auto px-6">

    <div class="bg-white rounded-2xl shadow-xl p-10">

      <h2 class="text-3xl font-bold text-orange-600 mb-8">
        Crear Cuenta
      </h2>

      <!-- ROLE SELECTOR -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <button type="button"
          class="role-btn border-2 border-orange-500 bg-orange-50 rounded-xl py-4 font-semibold transition"
          data-role="user">
           Usuario
        </button>

        <button type="button"
          class="role-btn border-2 border-gray-300 rounded-xl py-4 font-semibold transition hover:border-orange-400"
          data-role="seller">
          Vendedor
        </button>
      </div>

      <form id="registerForm" class="space-y-6">

        <input type="text" id="name" placeholder="Nombre completo"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <input type="email" id="email" placeholder="Email"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <input type="password" id="password" placeholder="Contraseña"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <input type="password" id="confirmPassword"
          placeholder="Confirmar contraseña"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <button type="submit"
          class="w-full bg-orange-600 text-white py-4 rounded-full font-semibold hover:bg-orange-700 transition shadow-md hover:shadow-lg">
          Registrarse
        </button>

      </form>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-300 py-6">
  <div class="max-w-7xl mx-auto px-6 text-center text-sm">
    ©️ 2026 PuntoCerca - Plataforma de comercios locales
  </div>
</footer>

<script>

let csrfToken = null;

/* ================================
   OBTENER CSRF TOKEN
================================ */
async function getCsrfToken() {
  const response = await fetch("/api/csrf-token", {
    credentials: "include"
  });
  const data = await response.json();
  csrfToken = data.csrfToken;
}

/* ================================
   ROLE SELECTOR
================================ */
let selectedRole = "user";

document.querySelectorAll(".role-btn").forEach(btn=>{
  btn.addEventListener("click", function(){

    document.querySelectorAll(".role-btn").forEach(b=>{
      b.classList.remove("border-orange-500","bg-orange-50");
      b.classList.add("border-gray-300");
    });

    this.classList.add("border-orange-500","bg-orange-50");
    this.classList.remove("border-gray-300");

    selectedRole = this.dataset.role;
  });
});

/* ================================
   SUBMIT
================================ */
document.getElementById("registerForm").addEventListener("submit", async function(e){

  e.preventDefault();

  if (!csrfToken) {
    await getCsrfToken();
  }

  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(password !== confirmPassword){
    alert("Las contraseñas no coinciden");
    return;
  }

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: password,
    role: selectedRole
  };

  const response = await fetch('/api/register',{
    method:'POST',
    credentials: "include",
    headers:{
      'Content-Type':'application/json',
      'x-csrf-token': csrfToken
    },
    body:JSON.stringify(data)
  });

  const result = await response.json();

  if(!response.ok){
    alert(result.error || "Error en registro");
    return;
  }

  alert("Revisa tu email para confirmar tu cuenta 📩");
  window.location.href="/";
});

getCsrfToken();

</script>

</body>
</html>
