<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="text-2xl font-bold text-orange-600">
      PuntoCerca
    </div>
    <a href="/" class="text-gray-700 hover:text-orange-600 transition">
      Inicio
    </a>
  </div>
</nav>

<!-- CONTENIDO -->
<section class="flex-grow py-24">
  <div class="max-w-md mx-auto px-6">

    <div class="bg-white rounded-2xl shadow-xl p-10">

      <h2 class="text-3xl font-bold text-orange-600 mb-8 text-center">
        Iniciar Sesión
      </h2>

      <form id="loginForm" class="space-y-6">

        <input type="email" id="email"
          placeholder="Email"
          class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
          required>

        <div class="relative">
  <input type="password" id="password"
    placeholder="Contraseña"
    class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none pr-12"
    required>

  <button type="button" id="togglePassword"
  class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-orange-600 transition">
  <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
  </svg>
</button>

</div>

        <button type="submit"
          class="w-full bg-orange-600 text-white py-4 rounded-full font-semibold hover:bg-orange-700 transition shadow-md">
          Ingresar
        </button>
         <p class="text-center text-sm mt-4">
  <a href="/forgot-password.html" class="text-orange-600 hover:underline">
    ¿Olvidaste tu contraseña?
  </a>
</p>

        <p class="text-center text-sm mt-4">
          ¿No recibiste el email de verificación?
        </p>

        <button id="resendBtn" type="button"
          class="w-full mt-2 bg-gray-200 py-3 rounded-xl hover:bg-gray-300 transition">
          Reenviar email
        </button>

      </form>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-300 py-6">
  <div class="max-w-7xl mx-auto px-6 text-center text-sm">
    ©️ 2026 PuntoCerca - Plataforma de comercios locales
  </div>
</footer>
<div id="toastContainer" style="
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 999999;
"></div>

  <script type="module">
  import { showToast } from "/js/utils/toast.js";
  window.showToast = showToast;
</script>

<script>

let csrfToken = null;

/* ================================
   CSRF
================================ */
async function getCsrfToken() {
  const response = await fetch("/api/csrf-token", {
    credentials: "include"
  });
  const data = await response.json();
  csrfToken = data.csrfToken;
}

/* ================================
   LOGIN
================================ */
document.getElementById("loginForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  if (!csrfToken) {
    await getCsrfToken();
  }

  const data = {
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value.trim()
  };

  try {

    const response = await fetch("/api/login", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "x-csrf-token": csrfToken
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!response.ok) {
      showToast(result.error || "Error en login", "error");
      return;
    }

    // 🔥 LOGIN INTELIGENTE
    try {

      const meRes = await fetch("/api/me", {
        credentials: "include"
      });

      if (!meRes.ok) {
        window.location.href = "/";
        return;
      }

      const user = await meRes.json();

     showToast("Bienvenido " + user.name, "success");

      // 👤 usuario normal
      if (user.role !== "seller") {
        window.location.href = "/";
        return;
      }

      // 🧑‍💼 seller → ver si tiene tienda
      const storeRes = await fetch("/api/my-store", {
        credentials: "include"
      });

      if (storeRes.status === 404) {
  // 🚨 onboarding directo a editar tienda
  window.location.href = "/edit-store";
  return;
}

      const store = await storeRes.json();

      // ✅ tiene tienda
      window.location.href = "/" + store.slug;

    } catch (err) {
      console.error(err);
      window.location.href = "/";
    }

  } catch (error) {
    console.error(error);
    showToast("Error de conexión con el servidor", "error");
  }

});

/* ================================
   RESEND EMAIL
================================ */
document.getElementById("resendBtn")
.addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();

  if (!email) {
    showToast("Ingresa tu email primero", "warning");
    return;
  }

  try {

    await getCsrfToken();

    const response = await fetch("/api/resend-verification", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "x-csrf-token": csrfToken
      },
      body: JSON.stringify({ email })
    });

    const result = await response.json();

    showToast(result.message || result.error, result.error ? "error" : "success");

  } catch (error) {
    console.error(error);
   showToast("Error reenviando email", "error");
  }

});

getCsrfToken();

   /* ================================
   TOGGLE PASSWORD
================================ */

const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

if (togglePassword && passwordInput) {
  togglePassword.addEventListener("click", () => {

    const isHidden = passwordInput.type === "password";

    passwordInput.type = isHidden ? "text" : "password";

    document.getElementById("eyeIcon").innerHTML = isHidden
  ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`
  : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;


  });
}

</script>

</body>
</html>
