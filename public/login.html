<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión - PuntoCerca</title>
<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
<style>
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 70% 0%, rgba(234,88,12,0.07) 0%, transparent 60%), #f8fafc;
    display: flex;
    flex-direction: column;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }
</style>
</head>

<body>

<!-- NAVBAR MÍNIMO -->
<nav style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;width:100%;">
  <a href="/" style="text-decoration:none;">
    <img src="/img/logo.png" style="height:40px;">
  </a>
  <a href="/register.html" style="font-size:14px;color:#6b7280;text-decoration:none;font-weight:500;">
    ¿No tenés cuenta? <span style="color:#ea580c;font-weight:700;">Registrate</span>
  </a>
</nav>

<!-- CONTENIDO -->
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:420px;">

    <!-- CARD -->
    <div style="background:white;border-radius:24px;padding:40px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.08);border:1px solid #f1f5f9;">

      <!-- HEADER -->
      <div style="text-align:center;margin-bottom:32px;">
        <div style="width:52px;height:52px;background:linear-gradient(135deg,#ea580c,#f97316);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg xmlns="http://www.w3.org/2000/svg" style="width:26px;height:26px;" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="white">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </div>
        <h1 style="font-size:22px;font-weight:900;color:#111827;letter-spacing:-0.03em;margin:0 0 6px;">Bienvenido de vuelta</h1>
        <p style="font-size:14px;color:#9ca3af;margin:0;">Ingresá a tu cuenta de PuntoCerca</p>
      </div>

      <!-- FORM -->
      <form id="loginForm" style="display:flex;flex-direction:column;gap:14px;">

        <div>
          <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;">Email</label>
          <input type="email" id="email" placeholder="tu@email.com"
            style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;transition:border-color 0.2s;"
            onfocus="this.style.borderColor='#ea580c'"
            onblur="this.style.borderColor='#e5e7eb'"
            required>
        </div>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <label style="font-size:13px;font-weight:700;color:#374151;">Contraseña</label>
            <a href="/forgot-password.html" style="font-size:12px;color:#ea580c;text-decoration:none;font-weight:600;">¿Olvidaste tu contraseña?</a>
          </div>
          <div style="position:relative;">
            <input type="password" id="password" placeholder="••••••••"
              style="width:100%;padding:12px 44px 12px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;transition:border-color 0.2s;"
              onfocus="this.style.borderColor='#ea580c'"
              onblur="this.style.borderColor='#e5e7eb'"
              required>
            <button type="button" id="togglePassword"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:0;display:flex;align-items:center;">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn"
          style="width:100%;padding:14px;background:linear-gradient(135deg,#ea580c,#f97316);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 6px 20px rgba(234,88,12,0.3);transition:all 0.2s;letter-spacing:-0.01em;"
          onmouseover="this.style.transform='translateY(-1px)'"
          onmouseout="this.style.transform='none'">
          Ingresar
        </button>

      </form>

      <!-- REENVIAR EMAIL (oculto por defecto) -->
      <div id="resendSection" style="display:none;margin-top:16px;padding:14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;text-align:center;">
        <p style="font-size:13px;color:#92400e;margin:0 0 10px;">¿No recibiste el email de verificación?</p>
        <button id="resendBtn" type="button"
          style="background:#ea580c;color:white;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">
          Reenviar email
        </button>
      </div>

      <!-- DIVIDER -->
      <div style="display:flex;align-items:center;gap:12px;margin:24px 0;">
        <div style="flex:1;height:1px;background:#f1f5f9;"></div>
        <span style="font-size:12px;color:#9ca3af;font-weight:500;">¿Sos nuevo?</span>
        <div style="flex:1;height:1px;background:#f1f5f9;"></div>
      </div>

      <a href="/register.html" style="
        display:block;
        text-align:center;
        padding:13px;
        border:1.5px solid #e5e7eb;
        border-radius:12px;
        font-size:14px;
        font-weight:700;
        color:#374151;
        text-decoration:none;
        transition:all 0.2s;
      "
      onmouseover="this.style.borderColor='#ea580c';this.style.color='#ea580c'"
      onmouseout="this.style.borderColor='#e5e7eb';this.style.color='#374151'"
      >
        Crear cuenta gratis
      </a>

    </div>

    <!-- COPYRIGHT -->
    <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:24px;">
      © 2026 PuntoCerca · <a href="/privacy.html" style="color:#9ca3af;">Privacidad</a>
    </p>

  </div>
</div>

<div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:999999;"></div>

<script type="module">
  import { showToast } from "/js/utils/toast.js";
  window.showToast = showToast;
</script>

<script>
let csrfToken = null;

async function getCsrfToken() {
  const response = await fetch("/api/csrf-token", { credentials: "include" });
  const data = await response.json();
  csrfToken = data.csrfToken;
}

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.textContent = "Ingresando...";
  btn.disabled = true;

  if (!csrfToken) await getCsrfToken();

  const data = {
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value.trim()
  };

  try {
    const response = await fetch("/api/login", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json", "x-csrf-token": csrfToken },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!response.ok) {
      // mostrar sección reenvío si es error de verificación
      if (result.error?.toLowerCase().includes("verif")) {
        document.getElementById("resendSection").style.display = "block";
      }
      showToast(result.error || "Error en login", "error");
      btn.textContent = "Ingresar";
      btn.disabled = false;
      return;
    }

    try {
      const meRes = await fetch("/api/me", { credentials: "include" });
      if (!meRes.ok) { window.location.href = "/"; return; }
      const user = await meRes.json();

      showToast("Bienvenido " + user.name, "success");

      if (user.role !== "seller") { window.location.href = "/"; return; }

      const storeRes = await fetch("/api/my-store", { credentials: "include" });
      if (storeRes.status === 404) { window.location.href = "/edit-store"; return; }
      const store = await storeRes.json();
      window.location.href = "/" + store.slug;

    } catch (err) {
      console.error(err);
      window.location.href = "/";
    }

  } catch (error) {
    console.error(error);
    showToast("Error de conexión", "error");
    btn.textContent = "Ingresar";
    btn.disabled = false;
  }
});

document.getElementById("resendBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if (!email) { showToast("Ingresá tu email primero", "warning"); return; }
  try {
    await getCsrfToken();
    const response = await fetch("/api/resend-verification", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json", "x-csrf-token": csrfToken },
      body: JSON.stringify({ email })
    });
    const result = await response.json();
    showToast(result.message || result.error, result.error ? "error" : "success");
  } catch (error) {
    showToast("Error reenviando email", "error");
  }
});

const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");
if (togglePassword && passwordInput) {
  const eyeIcon = document.getElementById("eyeIcon");
  togglePassword.addEventListener("click", () => {
    const isHidden = passwordInput.type === "password";
    passwordInput.type = isHidden ? "text" : "password";
    eyeIcon.innerHTML = isHidden
      ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`
      : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
  });
}

getCsrfToken();
</script>

</body>
</html>
