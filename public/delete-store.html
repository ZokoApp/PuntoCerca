<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliminar tienda - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
   <link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- NAV -->
<nav class="bg-white shadow-sm p-4">
  <div class="max-w-5xl mx-auto flex justify-between items-center">
    <strong class="text-orange-600 text-xl">PuntoCerca</strong>
    <a href="/dashboard" class="text-gray-600 hover:text-orange-600">Volver al dashboard</a>
  </div>
</nav>

<!-- CONTENIDO -->
<main class="flex-grow flex items-center justify-center px-6">

  <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl p-10 text-center">

    <h1 class="text-3xl font-bold text-red-600 mb-6">
      ⚠️ Eliminar tienda
    </h1>

    <p class="mb-6 text-gray-600">
      Esta acción eliminará permanentemente tu tienda y toda su información:
    </p>

    <ul class="text-left mb-6 space-y-2 text-gray-700">
      <li>❌ Todos tus productos</li>
      <li>❌ Todos tus seguidores</li>
      <li>❌ Todas tus estadísticas</li>
    </ul>

    <p class="mb-6 text-red-500 font-semibold">
      Esta acción NO se puede deshacer
    </p>

    <!-- INPUT CONFIRMACION -->
    <input 
      id="confirmInput"
      type="text"
      placeholder="Escribí ELIMINAR para confirmar"
      class="w-full px-4 py-3 border rounded-xl mb-6 text-center focus:outline-none focus:ring-2 focus:ring-red-400"
    >

    <!-- BOTONES -->
    <div class="flex gap-4">

      <button id="deleteBtn"
        class="flex-1 bg-red-600 text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition">
        Eliminar tienda
      </button>

      <a href="/dashboard"
        class="flex-1 bg-gray-200 py-3 rounded-xl text-center hover:bg-gray-300 transition">
        Cancelar
      </a>

    </div>

  </div>

</main>

<!-- TOAST -->
<div id="toastContainer" style="
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 999999;
"></div>

<!-- JS -->
<script type="module" src="/js/delete-store.js"></script>

</body>
</html>
