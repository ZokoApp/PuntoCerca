<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos - PuntoCerca</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:#f8fafc; min-height:100vh; }

    .navbar {
      background:white; border-bottom:1px solid #e5e7eb;
      padding:14px 20px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .navbar a { text-decoration:none; font-weight:900; font-size:18px; color:#111; }
    .navbar a span { color:#ea580c; }

    .container { max-width:960px; margin:0 auto; padding:24px 16px; }

    .back-link {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; color:#ea580c; text-decoration:none;
      margin-bottom:20px; font-weight:600;
    }
    .back-link:hover { text-decoration:underline; }

    .header { margin-bottom:28px; }
    .header h1 { font-size:22px; font-weight:800; color:#111827; }
    .header p { font-size:14px; color:#9ca3af; margin-top:4px; }

    .videos-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
      gap:24px;
    }

    @media (max-width:640px) {
      .videos-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/"><span>Punto</span>Cerca</a>
  </nav>

  <div class="container">
    <a id="backLink" href="/" class="back-link">← Volver a la tienda</a>

    <div class="header">
      <h1>🎬 Videos del local</h1>
      <p id="storeName" style="color:#6b7280;font-size:15px;margin-top:6px;"></p>
    </div>

    <div id="videosGrid" class="videos-grid">
      <p style="color:#9ca3af;">Cargando...</p>
    </div>
  </div>

  <script>
    const slug = window.location.pathname.split('/')[1];

    async function init() {
      try {
        const storeRes = await fetch(`/api/stores/slug/${slug}`);
        if (!storeRes.ok) return;
        const store = await storeRes.json();

        document.getElementById('storeName').textContent = store.name;
        document.getElementById('backLink').href = `/${slug}`;
        document.title = `Videos · ${store.name} | PuntoCerca`;

        const videosRes = await fetch(`/api/store-videos/${store.id}`);
        const videos = await videosRes.json();

        const grid = document.getElementById('videosGrid');

        if (!videos.length) {
          grid.innerHTML = `
            <p style="color:#9ca3af;font-size:14px;grid-column:1/-1;">
              Esta tienda no tiene videos publicados todavía.
            </p>`;
          return;
        }

        grid.innerHTML = videos.map(v => buildEmbed(v)).join('');

        if (videos.some(v => v.platform === 'instagram')) {
          const s = document.createElement('script');
          s.src = '//www.instagram.com/embed.js';
          s.async = true;
          document.body.appendChild(s);
        }

      } catch (err) {
        console.error(err);
      }
    }

    function buildEmbed(v) {
      if (v.platform === 'youtube') {
        const yt = v.url.match(
          /(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
        );
        if (!yt) return '';
        return `
          <div style="aspect-ratio:16/9;border-radius:14px;overflow:hidden;
            background:#000;box-shadow:0 4px 16px rgba(0,0,0,0.1);">
            <iframe
              src="https://www.youtube.com/embed/${yt[1]}"
              style="width:100%;height:100%;border:none;"
              allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>`;
      }

      if (v.platform === 'instagram') {
        return `
          <div>
            <blockquote
              class="instagram-media"
              data-instgrm-permalink="${v.url}"
              data-instgrm-version="14"
              style="background:#fff;border:0;border-radius:12px;
                box-shadow:0 0 1px 0 rgba(0,0,0,.5),0 1px 10px 0 rgba(0,0,0,.15);
                margin:0;padding:0;width:100%;min-width:280px;"
            ></blockquote>
          </div>`;
      }

      return '';
    }

    init();
  </script>

</body>
</html>
