<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña - PuntoCerca</title>

<link rel="stylesheet" href="/css/output.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="text-2xl font-bold text-orange-600">
      PuntoCerca
    </div>
    <a href="/login" class="text-gray-700 hover:text-orange-600 transition">
      Volver
    </a>
  </div>
</nav>

<!-- CONTENIDO -->
<section class="flex-grow py-24">
  <div class="max-w-md mx-auto px-6">

    <div class="bg-white rounded-2xl shadow-xl p-10">

      <h2 class="text-3xl font-bold text-orange-600 mb-6 text-center">
        Recuperar contraseña
      </h2>

      <p class="text-center text-sm text-gray-500 mb-6">
        Ingresá tu email y te enviaremos un link para restablecer tu contraseña.
      </p>

      <input type="email" id="email"
        placeholder="Email"
        class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
        required>

      <button onclick="recoverPassword()"
        class="w-full mt-6 bg-orange-600 text-white py-4 rounded-full font-semibold hover:bg-orange-700 transition shadow-md">
        Enviar enlace
      </button>

    </div>

  </div>
</section>

<!-- TOAST -->
<div id="toastContainer" class="fixed top-5 right-5 z-[9999] space-y-3"></div>

<script type="module">
  import { showToast } from "/js/utils/toast.js";
  window.showToast = showToast;
</script>

<script>

let csrfToken = null;

async function getCsrfToken() {
  const res = await fetch("/api/csrf-token", { credentials: "include" });
  const data = await res.json();
  csrfToken = data.csrfToken;
}

async function recoverPassword() {

  const email = document.getElementById("email").value.trim();

  if (!email) {
    showToast("Ingresá tu email", "warning");
    return;
  }

  try {

    if (!csrfToken) await getCsrfToken();

    const res = await fetch("/api/forgot-password", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "x-csrf-token": csrfToken
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || "Error", "error");
      return;
    }

    showToast("Si el email existe, te enviamos un link", "success");

  } catch (err) {
    console.error(err);
    showToast("Error de conexión", "error");
  }
}

getCsrfToken();

</script>

</body>
</html>
