<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar evento | PuntoCerca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .preview {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .preview:hover {
      transform: scale(1.02);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #ff6a00;
      box-shadow: 0 0 0 2px rgba(255,106,0,0.2);
    }

    .file-input {
      background: #f9fafb;
      border: 2px dashed #ddd;
      text-align: center;
      cursor: pointer;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: 0.2s;
    }

    .file-input:hover {
      border-color: #ff6a00;
      background: #fff3e6;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .save {
      background: #ff6a00;
      color: white;
    }

    .save:hover {
      background: #e65c00;
      transform: scale(1.03);
    }

    .cancel {
      background: #eee;
    }

    .cancel:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>✏️ Editar evento</h2>

    <!-- PREVIEW -->
    <img id="preview" class="preview" />

    <!-- UPLOAD -->
    <label class="file-input">
      📸 Cambiar imagen
      <input type="file" id="image" accept="image/*" hidden>
    </label>

    <!-- FORM -->
    <input id="title" placeholder="Título del evento">

    <input type="datetime-local" id="start_at">
    <input type="datetime-local" id="end_at">

    <div class="buttons">
      <button class="save" onclick="save()">Guardar cambios</button>
      <button class="cancel" onclick="cancel()">Cancelar</button>
    </div>
  </div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
  const res = await fetch(`/api/events/${id}`);
  const e = await res.json();

  document.getElementById("title").value = e.title;
  document.getElementById("start_at").value = e.start_at?.slice(0,16);
  document.getElementById("end_at").value = e.end_at?.slice(0,16);

  document.getElementById("preview").src = e.image_url;
}

document.getElementById("image").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  document.getElementById("preview").src = url;
});

async function save() {
  const formData = new FormData();

  formData.append("title", document.getElementById("title").value);
  formData.append("start_at", document.getElementById("start_at").value);
  formData.append("end_at", document.getElementById("end_at").value);

  const file = document.getElementById("image").files[0];
  if (file) formData.append("image", file);

  const res = await fetch(`/api/events/${id}`, {
    method: "PUT",
    credentials: "include",
    body: formData
  });

  if (!res.ok) {
    alert("Error actualizando");
    return;
  }

  alert("Evento actualizado");
  window.history.back();
}

function cancel() {
  window.history.back();
}

load();
</script>

</body>
</html>
