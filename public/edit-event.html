<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar evento | PuntoCerca</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#f3f4f6;
}

.container {
  max-width:500px;
  margin:60px auto;
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

input:focus {
  outline:none;
  border-color:#ff6a00;
  box-shadow:0 0 0 2px rgba(255,106,0,0.2);
}

.btn {
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.primary {
  background:#ff6a00;
  color:#fff;
}

.secondary {
  background:#e5e7eb;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.loading {
  opacity:0.6;
  pointer-events:none;
}
</style>

</head>

<body>

<div class="container" id="formBox">

  <h2>✏️ Editar evento</h2>

  <input id="title" placeholder="Título del evento" />

  <input id="start_at" type="datetime-local" />
  <input id="end_at" type="datetime-local" />

  <div class="actions">
    <button class="btn primary" onclick="save()">Guardar cambios</button>
    <button class="btn secondary" onclick="cancel()">Cancelar</button>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const box = document.getElementById("formBox");

async function load() {
  try {
    const res = await fetch(`/api/events/${id}`);
    const event = await res.json();

    document.getElementById("title").value = event.title;
    document.getElementById("start_at").value = event.start_at.slice(0,16);
    document.getElementById("end_at").value = event.end_at.slice(0,16);

  } catch {
    alert("Error cargando evento");
  }
}

async function save() {

  const title = document.getElementById("title").value.trim();
  const start_at = document.getElementById("start_at").value;
  const end_at = document.getElementById("end_at").value;

  if (!title || !start_at || !end_at) {
    alert("Completá todos los campos");
    return;
  }

  if (start_at > end_at) {
    alert("La fecha de inicio no puede ser mayor a la de fin");
    return;
  }

  box.classList.add("loading");

  const res = await fetch(`/api/events/${id}`, {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    credentials:"include",
    body: JSON.stringify({ title, start_at, end_at })
  });

  box.classList.remove("loading");

  if (!res.ok) {
    alert("Error actualizando");
    return;
  }

  alert("Evento actualizado");

  window.location.href = document.referrer || "/";
}

function cancel() {
  window.history.back();
}

load();
</script>

</body>
</html>
