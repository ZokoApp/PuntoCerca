<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - PuntoCerca</title>
<link rel="icon" type="image/png" href="/img/favicon.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
body { background:#f5f5f5; min-height:100vh; display:flex; flex-direction:column; }

.navbar {
  background:white;
  border-bottom:1px solid #ebebeb;
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}

.state-wrap {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.state-card {
  max-width:360px;
  width:100%;
  background:white;
  border-radius:24px;
  padding:40px 32px;
  text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  border:1px solid #f1f5f9;
}

.state-icon {
  width:64px;height:64px;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}

.state-card h1 { font-size:20px;font-weight:800;color:#111827;margin-bottom:8px; }
.state-card p { font-size:14px;color:#6b7280;line-height:1.6; }

.btn-ver {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#ea580c,#f97316);
  color:white;
  border:none;
  padding:14px 28px;
  border-radius:12px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  margin-top:20px;
  box-shadow:0 6px 20px rgba(234,88,12,0.3);
}

#pdfFrame {
  flex:1;
  width:100%;
  border:none;
  display:none;
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" style="text-decoration:none;">
    <img src="/img/logo.svg" style="height:40px;width:auto;">
  </a>
  <span id="storeName" style="font-size:13px;color:#6b7280;font-weight:600;"></span>
</nav>

<iframe id="pdfFrame"></iframe>

<div class="state-wrap" id="loadingState">
  <div class="state-card">
    <div class="state-icon" style="background:#fff7ed;">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;color:#ea580c;" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
    </div>
    <h1>Cargando catálogo...</h1>
    <p>Espera un momento</p>
  </div>
</div>

<div class="state-wrap" id="mobileState" style="display:none;">
  <div class="state-card">
    <div class="state-icon" style="background:#fff7ed;">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;color:#ea580c;" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
    </div>
    <h1 id="mobileStoreName">Catálogo</h1>
    <p>Tocá el botón para ver el catálogo completo</p>
    <a id="btnAbrirPDF" href="#" target="_blank" class="btn-ver">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
      </svg>
      Ver catálogo
    </a>
    <a id="btnVolverTienda" href="#" style="display:block;margin-top:14px;font-size:13px;color:#9ca3af;text-decoration:none;">
      Ver perfil de la tienda →
    </a>
  </div>
</div>

<div class="state-wrap" id="errorState" style="display:none;">
  <div class="state-card">
    <div class="state-icon" style="background:#fff7ed;">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;color:#ea580c;" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>
    <h1>Sin catálogo</h1>
    <p>Esta tienda no tiene catálogo disponible por el momento.</p>
  </div>
</div>

<script>
const slug = window.location.pathname.split('/').pop();
const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

async function init() {
  try {
    const res = await fetch(`/api/catalogo/${slug}`);

    if (!res.ok) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'flex';
      return;
    }

    const data = await res.json();

    document.getElementById('storeName').textContent = data.store_name;
    document.getElementById('loadingState').style.display = 'none';

    if (isMobile) {
      // en mobile abrir directo en nueva pestaña
      document.getElementById('mobileStoreName').textContent = data.store_name;
      document.getElementById('btnAbrirPDF').href = data.catalog_url;
      document.getElementById('btnVolverTienda').href = `/${slug}`;
      document.getElementById('mobileState').style.display = 'flex';
    } else {
      // en desktop mostrar en iframe
      const frame = document.getElementById('pdfFrame');
      frame.src = data.catalog_url;
      frame.style.display = 'block';
    }

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'flex';
  }
}

init();
</script>

</body>
</html>
